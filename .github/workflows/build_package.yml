name: Build and test package

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install system build deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: force clean rebuild
      run: |
        rm -rf build dist *.egg-info **/*.egg-info
        rm -rf .pytest_cache .mypy_cache
        python -m pip install -U pip setuptools wheel
        rm -rf ./*/__pycache__
        # (optional) ensure no cached sdist/wheel is reused
        # python -m pip cache purge

    - name: make
      run: |
        cmake .
        make

    - name: install fresh (no editable, no cache)
      run: |
        python -m pip uninstall -y nequick || true
        python -m pip install --no-cache-dir --force-reinstall .[test]

    - name: inspect installed nequick._c_ext without importing nequick package
      run: |
        python - <<'PY'
        import site, pathlib, importlib.util, sys

        sp = site.getsitepackages()
        if not sp:
            sp = [site.getusersitepackages()]
        base = pathlib.Path(sp[0])

        pkg_dir = None
        for p in base.rglob("nequick/__init__.py"):
            pkg_dir = p.parent
            break

        if not pkg_dir:
            raise SystemExit(f"Could not find installed nequick in {base}")

        cands = list(pkg_dir.glob("_c_ext*.so")) + list(pkg_dir.glob("_c_ext*.pyd"))
        print("pkg_dir:", pkg_dir)
        print("candidates:", [p.name for p in cands])
        if not cands:
            raise SystemExit("No _c_ext binary found")

        so = cands[0]
        spec = importlib.util.spec_from_file_location("nequick._c_ext_inspect", so)
        mod = importlib.util.module_from_spec(spec)
        spec.loader.exec_module(mod)

        print("binary:", so)
        print("has NeQuick:", hasattr(mod, "NeQuick"))
        print("matching attrs:", [a for a in dir(mod) if ("Ne" in a and "Quick" in a) or a.lower().endswith("nequick") or "nequick" in a.lower()])
        PY


    - name: verify loaded _c_ext
      run: |
        python -c "import nequick, nequick._c_ext; print('nequick:', nequick.__file__); print('_c_ext:', nequick._c_ext.__file__); print('has NeQuick:', hasattr(nequick._c_ext, 'NeQuick'))"

    - name: test
      run: |
        ctest -E unit_test
        pytest -v

  tag:
    needs: build

    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: pypi
    permissions:
      contents: write  # This is required so that semantic release can create a commit
      id-token: write  # this permission is mandatory for trusted publishing

    steps:

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # To fetch the tags
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install release dependenceies
        run: python -m pip install .[release]

      - name: Semantic Release
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          semantic-release version
        env:
          # This is required to create a commit in the repo
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

